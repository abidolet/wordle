_format_version: "3.0"

consumers:
  - username: app-csharp
    jwt_secrets:
      - key: "auth"
        secret: "${JWT_SECRET}"

plugins:
  - name: cors
    config:
      origins:
        - "http://localhost:5173"
      methods:
        - GET
        - POST
        - PUT
        - DELETE
        - OPTIONS
      headers:
        - Content-Type
        - Authorization
      credentials: true
      max_age: 3600

services:
  - name: auth
    url: http://auth:8080
    routes:
      - name: auth-public
        paths:
          - /auth/register
          - /auth/login
          - /auth/refresh
        strip_path: false

      - name: auth-private
        paths:
          - /auth/me
          - /auth/logout
        strip_path: false
        plugins:
          - name: jwt
            config:
              claims_to_verify:
                - exp
              header_names:
                - Authorization
              key_claim_name: iss
          - name: request-transformer
            config:
              add:
                headers:
                  - "X-User-Id:$(jwt.claims.sub)"
                  - "X-JWT-Jti:$(jwt.claims.jti)"
                  - "X-JWT-Exp:$(jwt.claims.exp)"
                  - "X-JWT-Email:$(jwt.claims.email)"

  - name: game
    url: http://game:8080
    routes:
      - name: game
        paths:
          - /game
        strip_path: false
        plugins:
          - name: jwt
            config:
              claims_to_verify:
                - exp
              header_names:
                - Authorization
              key_claim_name: iss

  - name: front
    url: http://front:5173
    routes:
      - name: front
        paths:
          - /
        strip_path: false
