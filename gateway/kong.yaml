_format_version: "3.0"

services:

  - name: front
    host: front
    port: 5173
    routes:
      - name: front
        paths:
          - /

  - name: auth
    url: http://auth:8080
    routes:
      - name: auth-public
        paths:
          - /auth/register
          - /auth/login
          - /auth/refresh
        strip_path: false

      - name: auth-private
        paths:
          - /auth/me
          - /auth/logout
        strip_path: false
        plugins:
          - name: jwt
            config:
              uri_param_names:
                - jwt
              cookie_names: []
              key_claim_name: iss
              secret_is_base64: false
              run_on_preflight: true

consumers:
  - username: app-csharp
    jwt_secrets:
      - key: "auth"
        secret: "${JWT_SECRET}"
