services:

  kong:
    build:
      context: gateway
      dockerfile: Dockerfile
    environment:
      KONG_ENV_VAR_PREFIX: ${KONG_ENV_VAR_PREFIX}
      KONG_DATABASE: ${KONG_DATABASE}
      KONG_DECLARATIVE_CONFIG: ${KONG_DECLARATIVE_CONFIG}
      KONG_SSL_CN: ${KONG_SSL_CN}
      KONG_SSL_DAYS: ${KONG_SSL_DAYS}
      KONG_SSL_CERT: ${KONG_SSL_CERT}
      KONG_SSL_CERT_KEY: ${KONG_SSL_CERT_KEY}
      JWT_SECRET: ${JWT_SECRET}
    ports:
      - "8443:8443"
    volumes:
      - ./gateway/kong.yaml:/etc/kong/kong.template.yaml
      - ssl_data:/etc/kong/ssl
    healthcheck:
      test: ["CMD", "kong", "health"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  auth:
    build:
      context: auth
      dockerfile: Dockerfile
    environment:
      ConnectionStrings__Default: ${AUTH_DB_CONNECTION}
      Jwt_Secret: ${JWT_SECRET}
      Jwt_Issuer: ${JWT_ISSUER}
      Jwt_Audience: ${JWT_AUDIENCE}
      ASPNETCORE_URLS: http://+:8080
      FortyTwo_ClientId: ${FORTY_TWO_CLIENT_ID}
      FortyTwo_ClientSecret: ${FORTY_TWO_CLIENT_SECRET}
      FortyTwo_RedirectUri: ${FORTY_TWO_REDIRECT_URI}
    volumes:
      - dp_keys:/root/.aspnet/DataProtection-Keys
    depends_on:
      postgres:
        condition: service_healthy

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "${POSTGRES_USER}"]
      interval: 5s
      retries: 10
  
  game:
    build:
      context: game
      dockerfile: Dockerfile
    environment:
      REDIS_ADDR: ${REDIS_ADDR}
      REDIS_PASSWORD: ${REDIS_PASSWORD}
    depends_on:
      redis:
        condition: service_healthy

  redis:
    image: redis:7-alpine
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      retries: 5

  front:
    build:
      context: ./front
      dockerfile: Dockerfile
    develop:
      watch:
        - action: sync
          path: ./front/src
          target: /app/src
        - action: rebuild
          path: ./front/package.json
          target: /app/package.json

volumes:
  ssl_data:
  dp_keys:
  pg_data:
  redis_data:
